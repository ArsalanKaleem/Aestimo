name: careergpt
description: "CareerGPT — AI-powered resume analysis and career assistant."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  http: ^1.2.0

  # Routing
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0

  # File handling
  file_picker: ^8.1.2

  # Markdown rendering (chat responses)
  flutter_markdown_plus: ^1.0.7
  pdf: ^3.11.1
  universal_html: ^2.2.4

  # Local persistence (mock sessions / preferences)
  shared_preferences: ^2.3.2

  # Typography
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  url_launcher: ^6.3.2
  path_provider: ^2.1.2
  flutter_launcher_icons: ^0.14.3

  # ----------------------------------------------------------------------
  # Enable these when wiring the real backend (see README "Going to prod").
  # firebase_core: ^3.6.0
  # firebase_auth: ^5.3.1
  # cloud_firestore: ^5.4.4
  # firebase_storage: ^12.3.4
  # google_sign_in: ^6.2.1
  # ----------------------------------------------------------------------

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/aestimo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/aestimo.png"
